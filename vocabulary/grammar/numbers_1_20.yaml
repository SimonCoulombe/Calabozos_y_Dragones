title: "Los Números"
subtitle: "1 → 20 — pour lancer les dés !"
framing: >
  En D&D on lance des dés tout le temps. Apprends à dire le résultat en espagnol !
  Saqué un quince. = J'ai fait un quinze.
  ¡Golpe crítico! = Critique ! (quand tu fais 20)
  ¡Fallo crítico! = Fumble ! (quand tu fais 1)

numbers:
  - {number: 1,  spanish: uno,       french: un,          dnd_note: "¡Fallo crítico!"}
  - {number: 2,  spanish: dos,       french: deux,        dnd_note: ""}
  - {number: 3,  spanish: tres,      french: trois,       dnd_note: ""}
  - {number: 4,  spanish: cuatro,    french: quatre,      dnd_note: ""}
  - {number: 5,  spanish: cinco,     french: cinq,        dnd_note: ""}
  - {number: 6,  spanish: seis,      french: six,         dnd_note: "Saqué un seis."}
  - {number: 7,  spanish: siete,     french: sept,        dnd_note: ""}
  - {number: 8,  spanish: ocho,      french: huit,        dnd_note: ""}
  - {number: 9,  spanish: nueve,     french: neuf,        dnd_note: ""}
  - {number: 10, spanish: diez,      french: dix,         dnd_note: "Tengo diez puntos de golpe."}
  - {number: 11, spanish: once,      french: onze,        dnd_note: ""}
  - {number: 12, spanish: doce,      french: douze,       dnd_note: ""}
  - {number: 13, spanish: trece,     french: treize,      dnd_note: ""}
  - {number: 14, spanish: catorce,   french: quatorze,    dnd_note: ""}
  - {number: 15, spanish: quince,    french: quinze,      dnd_note: "Saqué un quince. ¡Impacto!"}
  - {number: 16, spanish: dieciséis, french: seize,       dnd_note: ""}
  - {number: 17, spanish: diecisiete,french: dix-sept,    dnd_note: ""}
  - {number: 18, spanish: dieciocho, french: dix-huit,    dnd_note: "¡18 de fuerza! Eres muy fuerte."}
  - {number: 19, spanish: diecinueve,french: dix-neuf,    dnd_note: ""}
  - {number: 20, spanish: veinte,    french: vingt,       dnd_note: "¡Golpe crítico!"}

useful_phrases:
  - spanish: "Tengo… puntos de golpe"
    french: "J'ai… points de vie"
    example: "Tengo diez puntos de golpe."
  - spanish: "¡Golpe crítico!"
    french: "Coup critique !"
    example: "Saqué un veinte. ¡Golpe crítico!"
  - spanish: "¡Fallo crítico!"
    french: "Fumble !"
    example: "Saqué un uno. ¡Fallo crítico!"
