title: "Los Colores"
subtitle: "Décris ton équipement !"
framing: >
  En espagnol, l'adjectif se place APRÈS le nom et s'accorde en genre.
  una espada roja (une épée rouge) — rouge → roja car espada est féminin
  un escudo rojo (un bouclier rouge) — rouge → rojo car escudo est masculin

agreement_rule:
  masculine: "-o  → el escudo rojo, el casco negro"
  feminine: "-a  → la espada roja, la capa negra"
  exception: "certains adjectifs ne changent pas : verde, azul, gris"

colors:
  - {spanish_m: rojo,    spanish_f: roja,   french: rouge,   example: "una espada roja"}
  - {spanish_m: azul,    spanish_f: azul,   french: bleu,    example: "un escudo azul"}
  - {spanish_m: verde,   spanish_f: verde,  french: vert,    example: "una poción verde"}
  - {spanish_m: negro,   spanish_f: negra,  french: noir,    example: "una capa negra"}
  - {spanish_m: blanco,  spanish_f: blanca, french: blanc,   example: "un dragón blanco"}
  - {spanish_m: amarillo,spanish_f: amarilla,french: jaune,  example: "el oro amarillo"}
  - {spanish_m: gris,    spanish_f: gris,   french: gris,    example: "un casco gris"}
  - {spanish_m: morado,  spanish_f: morada, french: violet,  example: "una gema morada"}
  - {spanish_m: plateado,spanish_f: plateada,french: argenté,"example": "una espada plateada"}
  - {spanish_m: dorado,  spanish_f: dorada, french: doré,    example: "una armadura dorada"}

practice_sentences:
  - "Quiero una espada grande y roja."
  - "Tengo un escudo azul y plateado."
  - "El dragón es negro y poderoso."
  - "La poción verde cura diez puntos de golpe."

adjectives_title: "Otros adjetivos útiles"
adjectives_framing: >
  Ces adjectifs s'accordent de la même façon : -o au masculin, -a au féminin.
  Sauf ceux en -e ou -l qui ne changent pas (grande, joven, débil…).

adjectives:
  - {spanish_m: grande,     spanish_f: grande,     french: "grand / gros",       example: "un dragón grande"}
  - {spanish_m: pequeño,    spanish_f: pequeña,    french: "petit",               example: "un goblin pequeño"}
  - {spanish_m: nuevo,      spanish_f: nueva,      french: "nouveau / neuf",      example: "una espada nueva"}
  - {spanish_m: viejo,      spanish_f: vieja,      french: "vieux",               example: "un escudo viejo"}
  - {spanish_m: gastado,    spanish_f: gastada,    french: "usé / abîmé",         example: "una armadura gastada"}
  - {spanish_m: joven,      spanish_f: joven,      french: "jeune",               example: "un elfo joven"}
  - {spanish_m: rico,       spanish_f: rica,       french: "riche",               example: "el mercader rico"}
  - {spanish_m: pobre,      spanish_f: pobre,      french: "pauvre",              example: "el aldeano pobre"}
  - {spanish_m: fuerte,     spanish_f: fuerte,     french: "fort / puissant",     example: "el guerrero fuerte"}
  - {spanish_m: débil,      spanish_f: débil,      french: "faible",              example: "el enemigo débil"}
  - {spanish_m: rápido,     spanish_f: rápida,     french: "rapide",              example: "el ladrón rápido"}
  - {spanish_m: lento,      spanish_f: lenta,      french: "lent",                example: "el troll lento"}
  - {spanish_m: oscuro,     spanish_f: oscura,     french: "sombre / obscur",     example: "un pasillo oscuro"}
  - {spanish_m: luminoso,   spanish_f: luminosa,   french: "lumineux",            example: "un hechizo luminoso"}
  - {spanish_m: peligroso,  spanish_f: peligrosa,  french: "dangereux",           example: "la trampa peligrosa"}
  - {spanish_m: seguro,     spanish_f: segura,     french: "sûr / en sécurité",   example: "un lugar seguro"}
  - {spanish_m: mágico,     spanish_f: mágica,     french: "magique",             example: "un objeto mágico"}
  - {spanish_m: misterioso, spanish_f: misteriosa, french: "mystérieux",          example: "una puerta misteriosa"}
  - {spanish_m: antiguo,    spanish_f: antigua,    french: "ancien / vieux",      example: "un mapa antiguo"}
  - {spanish_m: pesado,     spanish_f: pesada,     french: "lourd",               example: "una armadura pesada"}
  - {spanish_m: ligero,     spanish_f: ligera,     french: "léger",               example: "un arco ligero"}
